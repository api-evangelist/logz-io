naftiko: 1.0.0-alpha2
info:
  label: Logz.io Security Events
  description: 'Logz.io Security Events business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Security
  - SIEM
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: security-events
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Retrieve Cloud SIEM events.
    resources:
    - name: security-events-resource
      path: /v2/security/events
      operations:
      - name: get
        method: GET
        description: Retrieve Security Events resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: security-events-rest
    port: 8080
    description: REST adapter for Logz.io Security Events.
    resources:
    - path: /v2/security/events
      name: security-events-resource
      description: REST surface for Logz.io Security Events.
      operations:
      - method: GET
        name: get
        description: Retrieve Security Events resources.
        call: security-events.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: security-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Security Events.
    tools:
    - name: logzio-security-events-get
      description: Retrieve Logz.io Security Events resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: security-events.get
      outputParameters:
      - type: object
        mapping: $.
