naftiko: 1.0.0-alpha2
info:
  label: Logz.io Users
  description: 'Logz.io Users business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Account Management
  - Users
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: users
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage Logz.io users across associated accounts.
    resources:
    - name: users-resource
      path: /v1/user-management/users
      operations:
      - name: get
        method: GET
        description: Retrieve Users resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: users-rest
    port: 8080
    description: REST adapter for Logz.io Users.
    resources:
    - path: /v1/user-management/users
      name: users-resource
      description: REST surface for Logz.io Users.
      operations:
      - method: GET
        name: get
        description: Retrieve Users resources.
        call: users.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Users.
    tools:
    - name: logzio-users-get
      description: Retrieve Logz.io Users resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users.get
      outputParameters:
      - type: object
        mapping: $.
