naftiko: 1.0.0-alpha2
info:
  label: Logz.io Authentication Groups
  description: 'Logz.io Authentication Groups business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Account Management
  - Identity
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: authentication-groups
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage SSO authentication group mappings.
    resources:
    - name: authentication-groups-resource
      path: /v1/authentication/groups
      operations:
      - name: get
        method: GET
        description: Retrieve Authentication Groups resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: authentication-groups-rest
    port: 8080
    description: REST adapter for Logz.io Authentication Groups.
    resources:
    - path: /v1/authentication/groups
      name: authentication-groups-resource
      description: REST surface for Logz.io Authentication Groups.
      operations:
      - method: GET
        name: get
        description: Retrieve Authentication Groups resources.
        call: authentication-groups.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: authentication-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Authentication Groups.
    tools:
    - name: logzio-authentication-groups-get
      description: Retrieve Logz.io Authentication Groups resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: authentication-groups.get
      outputParameters:
      - type: object
        mapping: $.
