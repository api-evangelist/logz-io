naftiko: 1.0.0-alpha2
info:
  label: Logz.io Notification Endpoints
  description: 'Logz.io Notification Endpoints business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Notifications
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: notification-endpoints
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage downstream notification endpoints (Slack, PagerDuty, webhooks, etc.).
    resources:
    - name: notification-endpoints-resource
      path: /v1/endpoints
      operations:
      - name: get
        method: GET
        description: Retrieve Notification Endpoints resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: notification-endpoints-rest
    port: 8080
    description: REST adapter for Logz.io Notification Endpoints.
    resources:
    - path: /v1/endpoints
      name: notification-endpoints-resource
      description: REST surface for Logz.io Notification Endpoints.
      operations:
      - method: GET
        name: get
        description: Retrieve Notification Endpoints resources.
        call: notification-endpoints.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: notification-endpoints-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Notification Endpoints.
    tools:
    - name: logzio-notification-endpoints-get
      description: Retrieve Logz.io Notification Endpoints resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: notification-endpoints.get
      outputParameters:
      - type: object
        mapping: $.
