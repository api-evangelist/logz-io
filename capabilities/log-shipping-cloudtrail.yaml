naftiko: 1.0.0-alpha2
info:
  label: Logz.io Log Shipping CloudTrail
  description: 'Logz.io Log Shipping CloudTrail business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - AWS
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: log-shipping-cloudtrail
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage AWS CloudTrail log shipping.
    resources:
    - name: log-shipping-cloudtrail-resource
      path: /v1/log-shipping/cloudtrails
      operations:
      - name: get
        method: GET
        description: Retrieve Log Shipping CloudTrail resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: log-shipping-cloudtrail-rest
    port: 8080
    description: REST adapter for Logz.io Log Shipping CloudTrail.
    resources:
    - path: /v1/log-shipping/cloudtrails
      name: log-shipping-cloudtrail-resource
      description: REST surface for Logz.io Log Shipping CloudTrail.
      operations:
      - method: GET
        name: get
        description: Retrieve Log Shipping CloudTrail resources.
        call: log-shipping-cloudtrail.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: log-shipping-cloudtrail-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Log Shipping CloudTrail.
    tools:
    - name: logzio-log-shipping-cloudtrail-get
      description: Retrieve Logz.io Log Shipping CloudTrail resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: log-shipping-cloudtrail.get
      outputParameters:
      - type: object
        mapping: $.
