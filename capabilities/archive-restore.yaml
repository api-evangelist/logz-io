naftiko: 1.0.0-alpha2
info:
  label: Logz.io Archive and Restore
  description: 'Logz.io Archive and Restore business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Archival
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: archive-restore
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage archive destinations and restore archived logs.
    resources:
    - name: archive-restore-resource
      path: /v2/archive/settings
      operations:
      - name: get
        method: GET
        description: Retrieve Archive and Restore resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: archive-restore-rest
    port: 8080
    description: REST adapter for Logz.io Archive and Restore.
    resources:
    - path: /v2/archive/settings
      name: archive-restore-resource
      description: REST surface for Logz.io Archive and Restore.
      operations:
      - method: GET
        name: get
        description: Retrieve Archive and Restore resources.
        call: archive-restore.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: archive-restore-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Archive and Restore.
    tools:
    - name: logzio-archive-restore-get
      description: Retrieve Logz.io Archive and Restore resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: archive-restore.get
      outputParameters:
      - type: object
        mapping: $.
