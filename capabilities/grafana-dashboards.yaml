naftiko: 1.0.0-alpha2
info:
  label: Logz.io Grafana Dashboards
  description: 'Logz.io Grafana Dashboards business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Dashboards
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: grafana-dashboards
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage Grafana dashboards on Logz.io.
    resources:
    - name: grafana-dashboards-resource
      path: /v1/grafana/api/dashboards/db
      operations:
      - name: get
        method: GET
        description: Retrieve Grafana Dashboards resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: grafana-dashboards-rest
    port: 8080
    description: REST adapter for Logz.io Grafana Dashboards.
    resources:
    - path: /v1/grafana/api/dashboards/db
      name: grafana-dashboards-resource
      description: REST surface for Logz.io Grafana Dashboards.
      operations:
      - method: GET
        name: get
        description: Retrieve Grafana Dashboards resources.
        call: grafana-dashboards.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grafana-dashboards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Grafana Dashboards.
    tools:
    - name: logzio-grafana-dashboards-get
      description: Retrieve Logz.io Grafana Dashboards resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grafana-dashboards.get
      outputParameters:
      - type: object
        mapping: $.
