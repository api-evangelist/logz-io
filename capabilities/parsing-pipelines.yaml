naftiko: 1.0.0-alpha2
info:
  label: Logz.io Parsing Pipelines
  description: 'Logz.io Parsing Pipelines business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Parsing
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: parsing-pipelines
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage Sawmill log-type parsing pipelines.
    resources:
    - name: parsing-pipelines-resource
      path: /v1/sawmill/log-type-pipeline
      operations:
      - name: get
        method: GET
        description: Retrieve Parsing Pipelines resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: parsing-pipelines-rest
    port: 8080
    description: REST adapter for Logz.io Parsing Pipelines.
    resources:
    - path: /v1/sawmill/log-type-pipeline
      name: parsing-pipelines-resource
      description: REST surface for Logz.io Parsing Pipelines.
      operations:
      - method: GET
        name: get
        description: Retrieve Parsing Pipelines resources.
        call: parsing-pipelines.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: parsing-pipelines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Parsing Pipelines.
    tools:
    - name: logzio-parsing-pipelines-get
      description: Retrieve Logz.io Parsing Pipelines resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: parsing-pipelines.get
      outputParameters:
      - type: object
        mapping: $.
