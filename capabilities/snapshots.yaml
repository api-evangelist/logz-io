naftiko: 1.0.0-alpha2
info:
  label: Logz.io OpenSearch Snapshots
  description: 'Logz.io OpenSearch Snapshots business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - OpenSearch
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: snapshots
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Import / export OpenSearch saved objects.
    resources:
    - name: snapshots-resource
      path: /v1/osd/saved-objects
      operations:
      - name: get
        method: GET
        description: Retrieve OpenSearch Snapshots resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: snapshots-rest
    port: 8080
    description: REST adapter for Logz.io OpenSearch Snapshots.
    resources:
    - path: /v1/osd/saved-objects
      name: snapshots-resource
      description: REST surface for Logz.io OpenSearch Snapshots.
      operations:
      - method: GET
        name: get
        description: Retrieve OpenSearch Snapshots resources.
        call: snapshots.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: snapshots-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io OpenSearch Snapshots.
    tools:
    - name: logzio-snapshots-get
      description: Retrieve Logz.io OpenSearch Snapshots resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: snapshots.get
      outputParameters:
      - type: object
        mapping: $.
