naftiko: 1.0.0-alpha2
info:
  label: Logz.io Triggered Alerts
  description: 'Logz.io Triggered Alerts business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Alerting
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: triggered-alerts
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: List currently triggered Logz.io alerts.
    resources:
    - name: triggered-alerts-resource
      path: /v1/alerts/triggered-alerts
      operations:
      - name: get
        method: GET
        description: Retrieve Triggered Alerts resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: triggered-alerts-rest
    port: 8080
    description: REST adapter for Logz.io Triggered Alerts.
    resources:
    - path: /v1/alerts/triggered-alerts
      name: triggered-alerts-resource
      description: REST surface for Logz.io Triggered Alerts.
      operations:
      - method: GET
        name: get
        description: Retrieve Triggered Alerts resources.
        call: triggered-alerts.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: triggered-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Triggered Alerts.
    tools:
    - name: logzio-triggered-alerts-get
      description: Retrieve Logz.io Triggered Alerts resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: triggered-alerts.get
      outputParameters:
      - type: object
        mapping: $.
