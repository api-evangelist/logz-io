naftiko: 1.0.0-alpha2
info:
  label: Logz.io Insights
  description: 'Logz.io Insights business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - AIOps
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: insights
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Retrieve operational insights and anomalies.
    resources:
    - name: insights-resource
      path: /v1/insights/list
      operations:
      - name: get
        method: GET
        description: Retrieve Insights resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: insights-rest
    port: 8080
    description: REST adapter for Logz.io Insights.
    resources:
    - path: /v1/insights/list
      name: insights-resource
      description: REST surface for Logz.io Insights.
      operations:
      - method: GET
        name: get
        description: Retrieve Insights resources.
        call: insights.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: insights-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Insights.
    tools:
    - name: logzio-insights-get
      description: Retrieve Logz.io Insights resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: insights.get
      outputParameters:
      - type: object
        mapping: $.
