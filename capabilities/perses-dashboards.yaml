naftiko: 1.0.0-alpha2
info:
  label: Logz.io Perses Dashboards
  description: 'Logz.io Perses Dashboards business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Dashboards
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: perses-dashboards
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage Perses dashboards on Logz.io.
    resources:
    - name: perses-dashboards-resource
      path: /perses-public/api/v1/dashboards
      operations:
      - name: get
        method: GET
        description: Retrieve Perses Dashboards resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: perses-dashboards-rest
    port: 8080
    description: REST adapter for Logz.io Perses Dashboards.
    resources:
    - path: /perses-public/api/v1/dashboards
      name: perses-dashboards-resource
      description: REST surface for Logz.io Perses Dashboards.
      operations:
      - method: GET
        name: get
        description: Retrieve Perses Dashboards resources.
        call: perses-dashboards.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: perses-dashboards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Perses Dashboards.
    tools:
    - name: logzio-perses-dashboards-get
      description: Retrieve Logz.io Perses Dashboards resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: perses-dashboards.get
      outputParameters:
      - type: object
        mapping: $.
