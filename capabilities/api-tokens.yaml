naftiko: 1.0.0-alpha2
info:
  label: Logz.io API Tokens
  description: 'Logz.io API Tokens business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Account Management
  - Security
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: api-tokens
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage Logz.io API tokens.
    resources:
    - name: api-tokens-resource
      path: /v1/user/api-tokens
      operations:
      - name: get
        method: GET
        description: Retrieve API Tokens resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: api-tokens-rest
    port: 8080
    description: REST adapter for Logz.io API Tokens.
    resources:
    - path: /v1/user/api-tokens
      name: api-tokens-resource
      description: REST surface for Logz.io API Tokens.
      operations:
      - method: GET
        name: get
        description: Retrieve API Tokens resources.
        call: api-tokens.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io API Tokens.
    tools:
    - name: logzio-api-tokens-get
      description: Retrieve Logz.io API Tokens resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-tokens.get
      outputParameters:
      - type: object
        mapping: $.
