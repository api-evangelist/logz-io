naftiko: 1.0.0-alpha2
info:
  label: Logz.io Search Logs
  description: 'Logz.io Search Logs business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Search
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: search-logs
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Search Logz.io-indexed logs via Elasticsearch-compatible queries.
    resources:
    - name: search-logs-resource
      path: /v1/search
      operations:
      - name: get
        method: GET
        description: Retrieve Search Logs resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: search-logs-rest
    port: 8080
    description: REST adapter for Logz.io Search Logs.
    resources:
    - path: /v1/search
      name: search-logs-resource
      description: REST surface for Logz.io Search Logs.
      operations:
      - method: GET
        name: get
        description: Retrieve Search Logs resources.
        call: search-logs.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: search-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Search Logs.
    tools:
    - name: logzio-search-logs-get
      description: Retrieve Logz.io Search Logs resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: search-logs.get
      outputParameters:
      - type: object
        mapping: $.
