naftiko: 1.0.0-alpha2
info:
  label: Logz.io Grafana Folders
  description: 'Logz.io Grafana Folders business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Observability
  - Dashboards
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: grafana-folders
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Manage Grafana dashboard folders.
    resources:
    - name: grafana-folders-resource
      path: /v1/grafana/api/folders
      operations:
      - name: get
        method: GET
        description: Retrieve Grafana Folders resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: grafana-folders-rest
    port: 8080
    description: REST adapter for Logz.io Grafana Folders.
    resources:
    - path: /v1/grafana/api/folders
      name: grafana-folders-resource
      description: REST surface for Logz.io Grafana Folders.
      operations:
      - method: GET
        name: get
        description: Retrieve Grafana Folders resources.
        call: grafana-folders.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grafana-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Grafana Folders.
    tools:
    - name: logzio-grafana-folders-get
      description: Retrieve Logz.io Grafana Folders resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grafana-folders.get
      outputParameters:
      - type: object
        mapping: $.
