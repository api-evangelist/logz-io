naftiko: 1.0.0-alpha2
info:
  label: Logz.io Audit Trail
  description: 'Logz.io Audit Trail business capability. Self-contained Naftiko capability covering one Logz.io API surface
    on the api.logz.io control plane.'
  tags:
  - Logz.io
  - Compliance
  - Audit
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LOGZIO_API_TOKEN: LOGZIO_API_TOKEN
    LOGZIO_API_BASE: LOGZIO_API_BASE
capability:
  consumes:
  - type: http
    namespace: audit-trail
    baseUri: '{{env.LOGZIO_API_BASE}}'
    description: Query Logz.io account audit trail.
    resources:
    - name: audit-trail-resource
      path: /v1/audit-trail
      operations:
      - name: get
        method: GET
        description: Retrieve Audit Trail resources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-TOKEN
      value: '{{env.LOGZIO_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: audit-trail-rest
    port: 8080
    description: REST adapter for Logz.io Audit Trail.
    resources:
    - path: /v1/audit-trail
      name: audit-trail-resource
      description: REST surface for Logz.io Audit Trail.
      operations:
      - method: GET
        name: get
        description: Retrieve Audit Trail resources.
        call: audit-trail.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: audit-trail-mcp
    port: 9090
    transport: http
    description: MCP adapter for Logz.io Audit Trail.
    tools:
    - name: logzio-audit-trail-get
      description: Retrieve Logz.io Audit Trail resources.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: audit-trail.get
      outputParameters:
      - type: object
        mapping: $.
