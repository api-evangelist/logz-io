aid: logz-io
url: https://raw.githubusercontent.com/api-evangelist/logz-io/refs/heads/main/apis.yml
apis:
- aid: logz-io:logz-io-search-logs-api
  name: Logz.io Search Logs API
  tags:
  - Observability
  - Logging
  - Search
  - ELK
  humanURL: https://api-docs.logz.io/docs/logz/search/
  baseURL: https://api.logz.io/v1/search
  properties:
  - url: https://api-docs.logz.io/docs/logz/search/
    type: Documentation
  - url: https://docs.logz.io/api/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  - url: json-schema/logz-io-search-request-schema.json
    type: JSONSchema
  - url: json-schema/logz-io-log-document-schema.json
    type: JSONSchema
  - url: json-ld/logz-io-context.jsonld
    type: JSONLD
  - url: graphql/logz-io-graphql.md
    type: GraphQL
  description: Query indexed logs against the Logz.io managed Elasticsearch / OpenSearch
    cluster using a request body that mirrors the upstream Elasticsearch Search API.
    Includes `/v1/search` for ad-hoc queries and `/v1/scroll` for iterating large
    result sets. Returns full Lucene-style hits, aggregations, and Elasticsearch metadata,
    enabling Kibana-equivalent search semantics over Logz.io-hosted indices.
- aid: logz-io:logz-io-archive-restore-api
  name: Logz.io Archive and Restore API
  tags:
  - Observability
  - Logging
  - Archival
  - S3
  humanURL: https://api-docs.logz.io/docs/logz/archive-logs/
  baseURL: https://api.logz.io/v2/archive
  properties:
  - url: https://api-docs.logz.io/docs/logz/archive-logs/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Configure long-term archive destinations (S3, ADLS, Google Cloud Storage),
    test connectivity, list and delete archive settings, then restore archived logs
    back into Logz.io for replay or compliance review. Backs Logz.io's tiered retention
    strategy of moving cold logs out of hot indices into customer-owned object storage.
- aid: logz-io:logz-io-drop-filters-api
  name: Logz.io Drop Filters API
  tags:
  - Observability
  - Logging
  - Data Optimization
  - Cost Management
  humanURL: https://api-docs.logz.io/docs/logz/drop-filters/
  baseURL: https://api.logz.io/v1/drop
  properties:
  - url: https://api-docs.logz.io/docs/logz/drop-filters/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Create, list, activate, deactivate, and delete drop filters that discard
    matching events before they enter Logz.io's hot index. The primary tool for trimming
    ingest volume and managing observability cost at the platform edge without changing
    customer shippers.
- aid: logz-io:logz-io-alerts-api
  name: Logz.io Alerts API
  tags:
  - Observability
  - Alerting
  - Monitoring
  humanURL: https://api-docs.logz.io/docs/logz/get-all-alerts/
  baseURL: https://api.logz.io/v2/alerts
  properties:
  - url: https://api-docs.logz.io/docs/logz/get-all-alerts/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  - url: json-schema/logz-io-alert-rule-schema.json
    type: JSONSchema
  description: Manage Logz.io alert rules — create, retrieve, update, enable, disable,
    and delete log-based and multi-account alerts via `/v2/alerts`, list currently
    triggered alerts via `/v1/alerts/triggered-alerts`, and publish event markers.
    Powers the unified alerting experience across log, metric, and security signals.
- aid: logz-io:logz-io-notification-endpoints-api
  name: Logz.io Notification Endpoints API
  tags:
  - Observability
  - Alerting
  - Notifications
  - Webhooks
  humanURL: https://api-docs.logz.io/docs/logz/endpoints/
  baseURL: https://api.logz.io/v1/endpoints
  properties:
  - url: https://api-docs.logz.io/docs/logz/endpoints/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Manage downstream notification destinations attached to alerts. Supports
    Slack, PagerDuty, Microsoft Teams, BigPanda, OpsGenie, ServiceNow, VictorOps,
    custom HTTPS webhooks, and email endpoints. Endpoints are decoupled from alert
    rules so a single destination can be reused across many alerts.
- aid: logz-io:logz-io-users-api
  name: Logz.io Users API
  tags:
  - Account Management
  - Users
  - Identity
  humanURL: https://api-docs.logz.io/docs/logz/manage-users/
  baseURL: https://api.logz.io/v1/user-management
  properties:
  - url: https://api-docs.logz.io/docs/logz/manage-users/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: List, create, update, suspend, and delete users in the main account
    and across all associated sub-accounts. Includes authentication groups (SSO group-to-role
    mappings), the `whoami` introspection endpoint, and `associated-accounts` for
    navigating the multi-account hierarchy.
- aid: logz-io:logz-io-tokens-api
  name: Logz.io Tokens API
  tags:
  - Account Management
  - Security
  - Credentials
  humanURL: https://api-docs.logz.io/docs/logz/manage-api-tokens/
  baseURL: https://api.logz.io/v1
  properties:
  - url: https://api-docs.logz.io/docs/logz/manage-api-tokens/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Manage the three Logz.io credential types — API tokens (account control
    plane), log-shipping tokens (ingest authentication for shippers like Filebeat,
    Fluentd, OpenTelemetry, and the Logz.io agents), and shared tokens (cross-account
    read access). Returns token IDs only; secret values are emitted once at creation.
- aid: logz-io:logz-io-accounts-api
  name: Logz.io Accounts API
  tags:
  - Account Management
  - Sub-Accounts
  - Multi-Tenant
  humanURL: https://api-docs.logz.io/docs/logz/manage-time-based-log-accounts/
  baseURL: https://api.logz.io/v1/account-management
  properties:
  - url: https://api-docs.logz.io/docs/logz/manage-time-based-log-accounts/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Provision and resize time-based log sub-accounts and metrics accounts.
    Lets owners split daily ingest quotas across environments, teams, or customers
    and reshape retention without re-shipping data. Includes the detailed view for
    time-based accounts with usage and quota.
- aid: logz-io:logz-io-metrics-prometheus-api
  name: Logz.io Metrics Prometheus API
  tags:
  - Observability
  - Metrics
  - Prometheus
  - PromQL
  humanURL: https://api-docs.logz.io/docs/logz/metrics-gateway/
  baseURL: https://api.logz.io/v1/metrics/prometheus/api/v1
  properties:
  - url: https://api-docs.logz.io/docs/logz/metrics-gateway/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  - url: json-schema/logz-io-metric-sample-schema.json
    type: JSONSchema
  description: Prometheus-compatible read path against the Logz.io Infrastructure
    Monitoring backend. Implements `query`, `query_range`, `series`, `labels`, and
    `label/{name}/values` exactly as upstream Prometheus, so existing Grafana data
    sources, alertmanagers, and PromQL tooling work unmodified against Logz.io-hosted
    metrics.
- aid: logz-io:logz-io-grafana-api
  name: Logz.io Grafana API
  tags:
  - Observability
  - Dashboards
  - Grafana
  - Visualization
  humanURL: https://api-docs.logz.io/docs/logz/grafana-alerting/
  baseURL: https://api.logz.io/v1/grafana/api
  properties:
  - url: https://api-docs.logz.io/docs/logz/grafana-alerting/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Pass-through API to the Logz.io fork of Grafana plus a subset of upstream
    Grafana endpoints. Covers dashboards (`/api/dashboards`), folders, alert rules
    and silences (`/api/v1/provisioning/alert-rules`, `/api/alertmanager/grafana/api/v2/silences`),
    annotations, contact points, notification policies, datasource summaries, and
    dashboard snapshots. The portable way to manage Logz.io's metrics UI as code.
- aid: logz-io:logz-io-perses-api
  name: Logz.io Perses API
  tags:
  - Observability
  - Dashboards
  - Perses
  - CNCF
  humanURL: https://api-docs.logz.io/docs/logz/perses/
  baseURL: https://api.logz.io/perses-public/api/v1
  properties:
  - url: https://api-docs.logz.io/docs/logz/perses/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Logz.io's Perses-compatible dashboard API (Perses is the CNCF observability
    dashboard project Logz.io helps maintain). Manages projects, dashboards, global
    datasources, and the Perses-flavored dashboard search/move operations alongside
    the Grafana surface — a forward-looking alternative for organizations standardizing
    on Perses-as-code.
- aid: logz-io:logz-io-cloud-siem-api
  name: Logz.io Cloud SIEM API
  tags:
  - Security
  - SIEM
  - Cloud SIEM
  - Threat Detection
  humanURL: https://api-docs.logz.io/docs/logz/security-rules/
  baseURL: https://api.logz.io/v2/security
  properties:
  - url: https://api-docs.logz.io/docs/logz/security-rules/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Logz.io Cloud SIEM control plane — manage detection rules (correlation
    and threshold), retrieve raised security events, and administer the SIEM sub-account.
    Backs the detect → triage → respond workflow of Logz.io's MITRE ATT&CK-aligned
    managed SIEM offering, including pre-built rule packs and analyst worklists.
- aid: logz-io:logz-io-log-shipping-api
  name: Logz.io Log Shipping API
  tags:
  - Observability
  - Data Ingestion
  - AWS
  - CloudTrail
  - S3
  humanURL: https://api-docs.logz.io/docs/logz/connect-to-cloud-trail/
  baseURL: https://api.logz.io/v1/log-shipping
  properties:
  - url: https://api-docs.logz.io/docs/logz/connect-to-cloud-trail/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Provision the Logz.io managed pull-side log shippers. Connect AWS CloudTrail
    streams and S3 buckets (with IAM assume-role) directly from the API so customers
    can stand up log collection without deploying agents on their AWS side.
- aid: logz-io:logz-io-parsing-pipelines-api
  name: Logz.io Parsing Pipelines API
  tags:
  - Observability
  - Logging
  - Parsing
  - Sawmill
  humanURL: https://api-docs.logz.io/docs/logz/parsing/
  baseURL: https://api.logz.io/v1/sawmill
  properties:
  - url: https://api-docs.logz.io/docs/logz/parsing/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Manage Sawmill log-type pipelines and external mapping uploads. Sawmill
    is Logz.io's open-source JSON transformation engine; this API lets customers attach
    declarative parsing pipelines per log-type and inject field-mapping overrides
    before logs hit the index.
- aid: logz-io:logz-io-lookup-lists-api
  name: Logz.io Lookup Lists API
  tags:
  - Observability
  - Logging
  - Enrichment
  - Reference Data
  humanURL: https://api-docs.logz.io/docs/logz/lookups/
  baseURL: https://api.logz.io/v1/lookups
  properties:
  - url: https://api-docs.logz.io/docs/logz/lookups/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: CRUD for reference data used to enrich and filter logs and alerts.
    Customers upload lookup lists of IPs, hostnames, user IDs, or business identifiers
    and reference them by name in alerts and queries, keeping SIEM and operational
    rules data-driven.
- aid: logz-io:logz-io-insights-api
  name: Logz.io Insights API
  tags:
  - Observability
  - AIOps
  - Insights
  humanURL: https://api-docs.logz.io/docs/logz/insights/
  baseURL: https://api.logz.io/v1/insights
  properties:
  - url: https://api-docs.logz.io/docs/logz/insights/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Retrieve the cognitive-insights and anomaly findings surfaced by Logz.io's
    AI observability layer. Returns ranked operational insights — Exceptions, Slow
    Transactions, Critical Events — for downstream automation and ticketing.
- aid: logz-io:logz-io-deployments-api
  name: Logz.io Deployment Markers API
  tags:
  - Observability
  - Deployments
  - DevOps
  humanURL: https://api-docs.logz.io/docs/logz/deployments/
  baseURL: https://api.logz.io/v2/markers
  properties:
  - url: https://api-docs.logz.io/docs/logz/deployments/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Post deployment events into Logz.io as markers so they overlay on dashboards
    and contextual searches. The mechanism release pipelines use to correlate spikes
    in error logs or latency with the deployment that caused them.
- aid: logz-io:logz-io-snapshots-api
  name: Logz.io OpenSearch Snapshots API
  tags:
  - Observability
  - Logging
  - Backup
  - OpenSearch
  humanURL: https://api-docs.logz.io/docs/logz/snapshots/
  baseURL: https://api.logz.io
  properties:
  - url: https://api-docs.logz.io/docs/logz/snapshots/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Drive the OpenSearch / Kibana saved-object snapshot lifecycle inside
    Logz.io — import and export visualizations, searches, and dashboard objects programmatically.
    The promotion-path used to ship Kibana content between Logz.io sub-accounts via
    CI.
- aid: logz-io:logz-io-audit-trail-api
  name: Logz.io Audit Trail API
  tags:
  - Compliance
  - Audit
  - Governance
  humanURL: https://api-docs.logz.io/docs/logz/retrieve-audit-trail/
  baseURL: https://api.logz.io/v1/audit-trail
  properties:
  - url: https://api-docs.logz.io/docs/logz/retrieve-audit-trail/
    type: Documentation
  - url: openapi/logz-io-api-openapi.yml
    type: OpenAPI
  description: Query the Logz.io account-level audit trail and list the event types
    it emits. Customers wire this into their own SIEM or governance pipelines for
    ISO 27001 / SOC 2-style activity tracking over Logz.io platform actions.
