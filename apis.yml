specificationVersion: '0.16'
description: Logz.io is a managed cloud observability platform built on the ELK Stack
  (Elasticsearch / Logstash / Kibana, plus OpenSearch and Grafana) that unifies log
  management, infrastructure monitoring, distributed tracing, and Cloud SIEM behind
  a consumption-based pricing model. The platform pairs an AI Agent layer for root-cause
  analysis with native OpenTelemetry, Prometheus, Grafana, and Perses compatibility,
  and exposes its entire control plane through a single OpenAPI 2.0-described public
  API covering search, alerting, sub-account management, security rules, parsing pipelines,
  archive / restore, and visualization-as-code via the Logz.io fork of Grafana and
  Perses.
